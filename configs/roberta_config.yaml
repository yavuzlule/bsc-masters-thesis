model:
  name: roberta-base
  type: transformers.RobertaForSequenceClassification

  params:
    num_classes: 2
    max_length: 128
    batch_size: 64
    num_epochs: 1
    learning_rate: 2e-5

  optimizer: torch.optim.AdamW

pipeline:
  run_preprocessing: true
  run_training: true

training:
  test_size: 0.2
  stratify: true

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

output:
  base_dir: results
  save_model: true

df: "data/interim/2026-04-20_13-04-01/dataset.parquet"