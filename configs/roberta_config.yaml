model:
  name: roberta-base
  type: transformers.RobertaForSequenceClassification

  params:
    num_classes: 2
    max_length: 256
    batch_size: 16
    num_epochs: 1
    learning_rate: 1e-5

  optimizer: torch.optim.AdamW


data:
  raw_text_dir: "data/raw"
  interim_path: "data/interim"
  target_column: label
pipeline:
  run_preprocessing: true
  run_training: true

training:
  test_size: 0.2
  stratify: true

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

output:
  base_dir: results
  save_model: true

