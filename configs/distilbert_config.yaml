model:
  name: distilbert-base-uncased
  type: transformers.DistilBertForSequenceClassification

  params:
    num_classes: 2
    max_length: 128
    batch_size: 32
    num_epochs: 4
    learning_rate: 3e-5

  optimizer: torch.optim.AdamW

pipeline:
  run_preprocessing: true
  run_training: true

data:
  raw_text_dir: "data/raw"
  interim_path: "data/interim"
  target_column: label

preprocessing:
  chunking:
    enabled: false
    max_words: 256
    overlap: 1

  embeddings:
    enabled: true
    model_name: "all-MiniLM-L6-v2"

training:
  test_size: 0.2
  stratify: true

  cross_validation:
    enabled: false
    folds: 5
    scoring: roc_auc

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

output:
  base_dir: results
  save_model: true

df: "data/interim/2026-04-20_13-04-01/dataset.parquet"