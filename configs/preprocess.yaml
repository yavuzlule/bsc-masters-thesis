data:
  raw_text_dir: "data/raw"
  label_map: {
            "recipes": 1,
            "filtered_non_cooking": 0
        }
  interim_path: "data/interim/chunked_256"
  target_column: label
  limit_files:
    enabled: false
    max_files: 20

preprocessing:
  chunking:
    enabled: true
    max_words: 256
    #overlap: 128

  embeddings:
    enabled: false
    model_name: "all-MiniLM-L6-v2"

pipeline:
  run_preprocessing: true
  run_training: false

