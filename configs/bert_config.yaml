model:
  name: bert-base-uncased
  type: transformers.BertForSequenceClassification

  params:
    num_classes : 2
    max_length : 128
    batch_size : 16
    num_epochs : 4  
    learning_rate : 2e-5

  optimizer: torch.optim.AdamW

  
pipeline:
  run_preprocessing: true
  run_training: true

data:
  raw_text_dir: "data/raw"
  train_path: "data/interim"
  target_column: label

preprocessing:
  chunking:
    enabled: false
    max_words: 256
    overlap: 1

  embeddings:
    enabled: true
    model_name: "all-MiniLM-L6-v2"

training:
  test_size: 0.2
  stratify: true

  cross_validation:
    enabled: false   # enable later if needed
    folds: 5
    scoring: roc_auc

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

output:
  base_dir: results
  save_model: true