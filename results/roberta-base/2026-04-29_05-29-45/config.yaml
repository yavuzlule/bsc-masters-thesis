data:
  interim_path: data/interim
  raw_text_dir: data/raw
  target_column: label
df: /Users/yavuzlule/Desktop/bsc-relish/data/interim/2026-04-29_02-45-44/dataset.parquet
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
model:
  name: roberta-base
  optimizer: torch.optim.AdamW
  params:
    batch_size: 16
