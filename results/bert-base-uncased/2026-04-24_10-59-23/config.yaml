data:
  interim_path: data/interim
  raw_text_dir: data/raw
  target_column: label
df: data/interim/2026-04-20_13-04-01/dataset.parquet
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
model:
  name: bert-base-uncased
  optimizer: torch.optim.AdamW
  params:
    batch_size: 16
    learning_rate: 2e-5
    max_length: 128
    num_classes: 2
    num_epochs: 4
  type: transformers.BertForSequenceClassification
output:
  base_dir: results
  save_model: true
pipeline:
  run_preprocessing: true
  run_training: true
preprocessing:
  chunking:
    enabled: false
    max_words: 256
    overlap: 1
  embeddings:
    enabled: true
    model_name: all-MiniLM-L6-v2
training:
  cross_validation:
    enabled: false
    folds: 5
    scoring: roc_auc
  stratify: true
  test_size: 0.2
