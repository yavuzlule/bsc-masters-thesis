data:
  interim_path: data/interim
  raw_text_dir: data/raw
  target_column: label
df: /Users/yavuzlule/Desktop/bsc-relish/data/interim/2026-04-29_02-45-44/dataset.parquet
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
model:
  name: logistic_regression
  params:
    C: 1.0
    class_weight: balanced
    max_iter: 500
    random_state: 42
    solver: saga
  type: sklearn.linear_model.LogisticRegression
output:
  base_dir: results
  save_model: true
training:
  cross_validation:
    enabled: false
    folds: 5
    scoring: roc_auc
  stratify: true
  test_size: 0.2
