data:
  raw_text_dir: data/raw
  target_column: label
  train_path: data/interim
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
model:
  name: logistic_regression
  params:
    C: 1.0
    class_weight: balanced
    max_iter: 500
    random_state: 42
    solver: saga
  type: sklearn.linear_model.LogisticRegression
output:
  base_dir: results
  save_model: true
pipeline:
  run_preprocessing: true
  run_training: true
preprocessing:
  chunking:
    enabled: false
    max_words: 256
    overlap: 1
  embeddings:
    enabled: true
    model_name: all-MiniLM-L6-v2
training:
  cross_validation:
    enabled: false
    folds: 5
    scoring: roc_auc
  stratify: true
  test_size: 0.2
